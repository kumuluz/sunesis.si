[build]
  command = "npm run build"
  publish = "public"
  environment = {NODE_VERSION = "20.19.5"}

[[redirects]]
  from = "/interstore/lpc/*"
  to = "https://lpc-generator.netlify.app/:splat"
  status = 200

[[headers]]
  for = "/interstore/lpc/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-hashes'; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: https:; connect-src 'self' https:; base-uri 'self'; form-action 'self' https:;"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer"
    Permission-Policy = "accelerometer=(), camera=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), sync-xhr=(), usb=(), vr=(), wake-lock=(), xr-spatial-tracking=()"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self';"
    X-Frame-Options = "DENY"
    Strict-Transport-Security = "max-age=31536000"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer"
    Permission-Policy = "accelerometer=(), camera=(), fullscreen=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), sync-xhr=(), usb=(), vr=(), wake-lock=(), xr-spatial-tracking=()"

[[plugins]]
  package = "@netlify/plugin-csp-nonce"
  [plugins.inputs]
    reportOnly = false
    unsafeEval = false
    excludedPath = ["/interstore/lpc", "/interstore/lpc/", "/interstore/lpc/*", "/interstore/lpc/**"]