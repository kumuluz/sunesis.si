<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      This hidden static form exists solely so Netlify's build-time bot can
      detect the "contact" form and its fields. The real, interactive form is
      React-rendered (src/views/landing/sections/final-cta.tsx) and submits to
      this path via fetch. Keep the field names here in sync with that form.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
